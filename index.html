<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChaiCode Cinema - Book Your Ticket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        overflow-x: hidden;
      }
      .glass-card {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .hidden { display: none; }
      
      /* Animation for smooth transition */
      .fade-in {
        animation: fadeIn 0.5s ease-in forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex flex-col items-center justify-center p-4">

    <div id="selection-view" class="max-w-4xl w-full text-center fade-in">
      <h1 class="text-5xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
        ChaiCode Cinema
      </h1>
      <p class="text-slate-400 text-xl mb-12">Select a movie to book your seats</p>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div onclick="initTheater(1, 'Avengers: Endgame', 'Whatever it takes!')" 
             class="glass-card p-8 rounded-3xl cursor-pointer hover:border-emerald-500/50 transition-all group hover:-translate-y-2">
          <div class="h-48 w-full bg-blue-900/30 rounded-2xl mb-6 flex items-center justify-center border border-blue-500/20">
             <span class="text-6xl group-hover:scale-110 transition-transform">🛡️</span>
          </div>
          <h2 class="text-2xl font-bold text-white mb-2">Avengers: Endgame</h2>
          <p class="text-slate-400">The epic conclusion to the Infinity Saga.</p>
        </div>

        <div onclick="initTheater(2, 'Dhurandhar The Revenge', 'Jassi ko ghar ki yaad kyu nhi aai?')" 
             class="glass-card p-8 rounded-3xl cursor-pointer hover:border-rose-500/50 transition-all group hover:-translate-y-2">
          <div class="h-48 w-full bg-rose-900/30 rounded-2xl mb-6 flex items-center justify-center border border-rose-500/20">
             <span class="text-6xl group-hover:scale-110 transition-transform">🔥</span>
          </div>
          <h2 class="text-2xl font-bold text-white mb-2">Dhurandhar</h2>
          <p class="text-slate-400">High-octane desi action like never before.</p>
        </div>
      </div>
    </div>

    <div id="theater-view" class="max-w-7xl w-full hidden">
      <div class="glass-card rounded-3xl shadow-2xl p-8 md:p-12">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
          <button onclick="goBack()" class="text-slate-400 hover:text-white transition flex items-center gap-2">
            ← Change Movie
          </button>
          <div class="text-center">
            <h2 id="display-title" class="text-4xl font-bold text-emerald-400"></h2>
            <p id="display-desc" class="text-slate-400 italic"></p>
          </div>
          <div class="w-24"></div> </div>

        <div class="flex justify-center mb-10">
          <div class="bg-slate-900/50 rounded-full px-6 py-3 border border-slate-700 flex gap-8 items-center text-sm md:text-base">
            <div class="flex items-center gap-2">
              <div class="w-4 h-4 rounded-full bg-emerald-500"></div>
              <span class="text-slate-300">Available</span>
            </div>
            <div class="w-px h-6 bg-slate-700"></div>
            <div class="flex items-center gap-2">
              <div class="w-4 h-4 rounded-full bg-rose-500/20 border border-rose-500/50"></div>
              <span class="text-slate-400">Booked</span>
            </div>
          </div>
        </div>

        <div class="w-full h-2 bg-gradient-to-r from-transparent via-cyan-500/50 to-transparent mb-16 rounded-full shadow-[0_10px_20px_rgba(34,211,238,0.2)]">
          <p class="text-center text-[10px] tracking-[0.5em] text-cyan-500/50 mt-4 uppercase">Cinema Screen This Way</p>
        </div>

        <div class="overflow-x-auto pb-4">
          <table id="tbl" class="border-separate border-spacing-3 md:border-spacing-4 mx-auto"></table>
        </div>
      </div>
    </div>

    <script>
      let currentMovieId = null;

      function initTheater(id, title, desc) {
        currentMovieId = id;
        
        // UI Updates
        document.getElementById('display-title').innerText = title;
        document.getElementById('display-desc').innerText = desc;
        
        // View Switching
        document.getElementById('selection-view').classList.add('hidden');
        document.getElementById('theater-view').classList.remove('hidden');
        document.getElementById('theater-view').classList.add('fade-in');

        renderSeats();
      }

      function goBack() {
        document.getElementById('selection-view').classList.remove('hidden');
        document.getElementById('theater-view').classList.add('hidden');
        document.getElementById('tbl').innerHTML = ""; 
      }

      async function renderSeats() {
        const tbl = document.getElementById("tbl");
        tbl.innerHTML = "<tr><td class='text-slate-400'>Loading theater...</td></tr>";

        try {
          const res = await fetch(`/seats?movie_id=${currentMovieId}`);
          const seats = await res.json();
          seats.sort((a, b) => a.id - b.id);
          
          tbl.innerHTML = ""; // Clear loader
          let tr;

          seats.forEach((seat, index) => {
            if (index % 8 === 0) {
              tr = document.createElement("tr");
              tbl.appendChild(tr);
            }

            const td = document.createElement("td");
            const baseClasses = "w-16 h-16 md:w-24 md:h-24 rounded-xl md:rounded-2xl text-center align-middle text-lg md:text-xl font-bold transition-all duration-300 select-none relative group";
            const seatLabel = seat.seat_number || (index + 1);

            if (seat.isbooked) {
              td.className = `${baseClasses} bg-rose-500/10 text-rose-500/40 border border-rose-500/20 cursor-not-allowed`;
              td.innerHTML = `
                <span>${seatLabel}</span>
                <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-1 bg-slate-900 border border-slate-700 text-xs text-slate-300 rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all whitespace-nowrap z-50">
                  Booked by: ${seat.name}
                </div>
              `;
            } else {
              td.className = `${baseClasses} bg-emerald-500/80 text-white border-2 border-emerald-400 cursor-pointer hover:bg-emerald-400 hover:-translate-y-1 shadow-lg hover:shadow-emerald-500/20`;
              td.innerHTML = `<span>${seatLabel}</span>`;
              
              td.addEventListener("click", async () => {
                const name = prompt(`Book Seat ${seatLabel} for:`);
                if (!name) return;

                const response = await fetch(`/${seat.id}/${name}`, { method: "PUT" });
                const result = await response.json();

                if (result.error) {
                  alert("Already booked!");
                } else {
                  alert("Ticket Confirmed!");
                  renderSeats(); // Refresh grid
                }
              });
            }
            tr.appendChild(td);
          });
        } catch (err) {
          console.error(err);
          tbl.innerHTML = "<tr><td class='text-red-400'>Error loading data.</td></tr>";
        }
      }
    </script>
  </body>
</html>
